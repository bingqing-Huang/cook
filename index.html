<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>黄记茶餐厅· 点菜中心</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0801;
      --surface:  #18110a;
      --card:     #231808;
      --gold:     #c9a84c;
      --gold2:    #e8c870;
      --cream:    #f4e5c2;
      --muted:    #7a6a52;
      --red:      #c03030;
      --green:    #3a8a4a;
      --r:        12px;
    }

    html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: -apple-system, 'PingFang SC', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      padding-bottom: 120px;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    #header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(to bottom, #1e1206, var(--bg) 100%);
      padding: 14px 16px 10px;
      text-align: center;
      border-bottom: 1px solid rgba(201,168,76,.15);
      backdrop-filter: blur(8px);
    }
    .restaurant-name {
      font-size: 21px; font-weight: 800;
      color: var(--gold); letter-spacing: 3px;
    }
    .restaurant-sub {
      font-size: 10px; color: var(--muted);
      letter-spacing: 4px; margin-top: 3px;
      text-transform: uppercase;
    }

    /* ── SETTINGS BAR ── */
    #settings {
      position: sticky; top: 57px; z-index: 99;
      background: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,.04);
      padding: 6px 0;
    }
    .chip-row {
      display: flex; gap: 8px;
      padding: 4px 14px;
      overflow-x: auto; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .chip-row::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid rgba(201,168,76,.25);
      font-size: 13px; color: var(--muted);
      cursor: pointer; white-space: nowrap;
      transition: all .18s; background: transparent;
      -webkit-user-select: none; user-select: none;
    }
    .chip.active {
      background: var(--gold); color: #1a0e00;
      border-color: var(--gold); font-weight: 700;
    }

    /* ── CATEGORY TABS ── */
    #cat-tabs {
      position: sticky; top: 131px; z-index: 98;
      display: flex; background: var(--surface);
      overflow-x: auto; scrollbar-width: none;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    #cat-tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 11px 16px;
      font-size: 13px; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .18s; white-space: nowrap;
      -webkit-user-select: none; user-select: none;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }

    /* ── MENU ── */
    #menu { padding: 16px 14px; }

    .cat-section { margin-bottom: 36px; }

    .sec-title {
      font-size: 17px; font-weight: 700; color: var(--gold);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .sec-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(201,168,76,.3), transparent);
    }

    /* ── FOOD GRID ── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 11px;
    }
    @media (min-width: 480px) { .items-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 700px) { .items-grid { grid-template-columns: repeat(4, 1fr); } }

    /* ── FOOD CARD ── */
    .food-card {
      background: var(--card);
      border-radius: var(--r);
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color .2s, transform .1s;
      position: relative;
      cursor: pointer;
    }
    .food-card.in-cart { border-color: var(--gold); }
    .food-card:active { transform: scale(.97); }

    .card-media {
      width: 100%; aspect-ratio: 4/3;
      position: relative; overflow: hidden;
    }
    .card-media img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .emoji-bg {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 52px;
      background: linear-gradient(135deg, #2a1c0c, #3d2a14);
    }
    .card-badge {
      position: absolute; top: 7px; right: 7px;
      background: var(--red); color: #fff;
      border-radius: 10px; padding: 2px 7px;
      font-size: 11px; font-weight: 700;
      display: none;
    }
    .card-badge.on { display: block; }

    .card-body { padding: 9px 9px 11px; }
    .card-name {
      font-size: 13px; font-weight: 600; color: var(--cream);
      text-align: center; margin-bottom: 9px; line-height: 1.35;
      min-height: 36px; display: flex; align-items: center; justify-content: center;
    }
    .card-controls {
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .qbtn {
      width: 28px; height: 28px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 18px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      line-height: 1; transition: transform .1s;
    }
    .qbtn:active { transform: scale(.88); }
    .qbtn.plus { background: var(--gold); color: #1a0e00; }
    .qbtn.plus.wide {
      width: auto; padding: 0 18px; border-radius: 20px;
      font-size: 13px; font-weight: 700;
    }
    .qbtn.minus { background: rgba(201,168,76,.15); color: var(--gold); }
    .qdisplay {
      font-size: 16px; font-weight: 700; color: var(--cream);
      min-width: 20px; text-align: center;
    }

    /* ── CART FAB ── */
    #cart-fab {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: var(--gold); color: #1a0e00;
      border: none; border-radius: 32px;
      padding: 15px 28px; font-size: 15px; font-weight: 800;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 6px 28px rgba(201,168,76,.45);
      white-space: nowrap;
      transition: opacity .2s, transform .2s;
      min-width: 210px; justify-content: center;
    }
    #cart-fab.hide { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(12px); }
    #cart-count-badge {
      background: var(--red); color: #fff;
      border-radius: 10px; padding: 2px 8px; font-size: 12px;
    }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      z-index: 290; display: none;
    }
    #overlay.on { display: block; }

    /* ── CART DRAWER ── */
    #cart-drawer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.32,.72,0,1);
      max-height: 82vh; display: flex; flex-direction: column;
    }
    #cart-drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 38px; height: 4px;
      background: rgba(255,255,255,.15); border-radius: 2px;
      margin: 12px auto 0;
    }
    .drawer-head {
      padding: 10px 18px 12px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .drawer-title { font-size: 17px; font-weight: 800; color: var(--gold); }
    .clear-btn {
      font-size: 13px; color: var(--muted);
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .drawer-body { flex: 1; overflow-y: auto; padding: 8px 18px 4px; }
    .drawer-foot {
      padding: 14px 18px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,.05);
    }

    .cart-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .ci-left { display: flex; align-items: center; gap: 12px; }
    .ci-emoji {
      font-size: 26px; width: 44px; height: 44px;
      background: var(--card); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ci-name { font-size: 14px; color: var(--cream); }
    .ci-controls { display: flex; align-items: center; gap: 10px; }

    .cat-label {
      font-size: 11px; color: var(--muted); letter-spacing: 1px;
      margin: 12px 0 4px; text-transform: uppercase;
    }

    .empty-msg {
      text-align: center; padding: 48px 20px; color: var(--muted);
    }
    .empty-msg .eico { font-size: 52px; margin-bottom: 12px; }

    .big-btn {
      width: 100%; padding: 16px; background: var(--gold);
      color: #1a0e00; border: none; border-radius: 13px;
      font-size: 16px; font-weight: 800; cursor: pointer;
      letter-spacing: 1px; transition: opacity .15s;
    }
    .big-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── CHECKOUT MODAL ── */
    #checkout-modal {
      position: fixed; inset: 0; z-index: 400;
      display: flex; align-items: flex-end; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity .2s;
    }
    #checkout-modal.on { pointer-events: all; opacity: 1; }

    .modal-box {
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      padding: 22px 18px;
      padding-bottom: max(22px, env(safe-area-inset-bottom));
      width: 100%; max-width: 600px;
    }
    .modal-title {
      font-size: 19px; font-weight: 800; color: var(--gold);
      text-align: center; margin-bottom: 18px;
    }
    .summary-box {
      background: var(--card); border-radius: 11px;
      padding: 13px 14px; margin-bottom: 16px;
      font-size: 13px; line-height: 1.9; color: var(--muted);
      max-height: 150px; overflow-y: auto;
    }
    .summary-box .hi { color: var(--cream); }
    .summary-box .hi-gold { color: var(--gold); font-weight: 600; }

    .inp-group { margin-bottom: 14px; }
    .inp-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
    .inp {
      width: 100%; background: var(--card);
      border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 10px; padding: 12px 14px;
      color: var(--cream); font-size: 16px; outline: none;
      transition: border-color .18s;
    }
    .inp:focus { border-color: var(--gold); }
    .inp.code {
      letter-spacing: 6px; text-align: center;
      font-size: 22px; font-weight: 700;
    }
    .inp.err { border-color: var(--red) !important; animation: shake .3s; }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-7px)}
      75%{transform:translateX(7px)}
    }
    .cancel-link {
      display: block; text-align: center;
      color: var(--muted); font-size: 14px;
      margin-top: 13px; cursor: pointer;
    }

    /* ── SUCCESS ── */
    #success {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(12,8,1,.92);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    #success.on { opacity: 1; pointer-events: all; }
    .s-icon { font-size: 80px; }
    .s-title { font-size: 24px; font-weight: 800; color: var(--gold); }
    .s-sub { font-size: 15px; color: var(--muted); }
    .s-btn {
      margin-top: 10px; padding: 14px 40px;
      background: var(--gold); color: #1a0e00;
      border: none; border-radius: 30px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
  </style>
</head>

<!-- ── OVERLAY ── -->
<div id="overlay" onclick="closeAll()"></div>

  <div class="drawer-foot">
    <button class="big-btn" onclick="openCheckout()">确认点单 →</button>
  </div>
</div>

<!-- ── CHECKOUT MODAL ── -->
<div id="checkout-modal">
  <div class="modal-box">
    <div class="modal-title">📋 确认点单</div>
    <div class="summary-box" id="order-summary"></div>

    <div class="inp-group">
      <label class="inp-label">备注（可选）</label>
      <input class="inp" id="note" type="text" placeholder="辣度、忌口、特别要求……">
    </div>

    <button class="big-btn" id="submit-btn" onclick="submitOrder()">
      发送点单 ✉️
    </button>
    <span class="cancel-link" onclick="closeCheckout()">取消</span>
  </div>
</div>

<!-- ── SUCCESS ── -->
<div id="success">
  <div class="s-icon">🎉</div>
  <div class="s-title">点单已发送！</div>
  <div class="s-sub">等待大厨为您精心准备 ❤️</div>
  <button class="s-btn" onclick="resetAll()">继续点餐</button>
</div>

      { id:'f5', name:'西瓜',  img:'images/fruits/watermelon.jpg', e:'🍉' },
      { id:'f6', name:'草莓',  img:'images/fruits/strawberry.jpg', e:'🍓' },
      { id:'f7', name:'猕猴桃',img:'images/fruits/kiwi.jpg',       e:'🥝' },
      { id:'f8', name:'芒果',  img:'images/fruits/mango.jpg',      e:'🥭' },
      { id:'f9', name:'蓝莓',  img:'images/fruits/blueberry.jpg',  e:'🫐' },
    ]
  }
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let cart = {};          // { id: { item, qty } }
let meal = '早饭';
let dateIdx = 0;

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function init() {
  buildDateChips();
  buildMenu();
  buildTabObserver();
}

function buildDateChips() {
  const row = document.getElementById('date-row');
  const DAY = ['日','一','二','三','四','五','六'];
  const labels = ['今天','明天','后天'];
  const now = new Date();

  labels.forEach((lbl, i) => {
    const d = new Date(now);
    d.setDate(d.getDate() + i);
    const chip = document.createElement('div');
    chip.className = 'chip' + (i === 0 ? ' active' : '');
    chip.dataset.i = i;
    chip.textContent = `${lbl} ${d.getMonth()+1}/${d.getDate()} 周${DAY[d.getDay()]}`;
    chip.onclick = () => {
      dateIdx = i;
      row.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', +c.dataset.i === i));
    };
    row.appendChild(chip);
  });
}

// Meal chips
document.getElementById('meal-row').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  meal = chip.dataset.v;
  document.querySelectorAll('#meal-row .chip').forEach(c =>
    c.classList.toggle('active', c.dataset.v === meal));
});

// ═══════════════════════════════════════════
//  MENU RENDER
// ═══════════════════════════════════════════
function buildMenu() {
  const menu = document.getElementById('menu');
  menu.innerHTML = '';
  MENU.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.id = 'cat-' + cat.key;

    const title = document.createElement('div');
    title.className = 'sec-title';
    title.textContent = cat.icon + ' ' + cat.title;
    sec.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'items-grid';
    cat.items.forEach(item => grid.appendChild(makeCard(item)));
    sec.appendChild(grid);
    menu.appendChild(sec);
  });
}

function makeCard(item) {
  const card = document.createElement('div');
  card.className = 'food-card' + (cart[item.id] ? ' in-cart' : '');
  card.id = 'card-' + item.id;
  card.innerHTML = cardHTML(item);
  return card;
}

function cardHTML(item) {
  const qty = cart[item.id]?.qty || 0;
  const media = item.img
    ? `<img src="${item.img}" alt="${item.name}"
           onerror="this.outerHTML='<div class=\\'emoji-bg\\'>${item.e}</div>'">`
    : `<div class="emoji-bg">${item.e}</div>`;

  const controls = qty > 0
    ? `<button class="qbtn minus" onclick="adj('${item.id}',-1)">−</button>
       <span class="qdisplay">${qty}</span>
       <button class="qbtn plus"  onclick="adj('${item.id}',+1)">+</button>`
    : `<button class="qbtn plus wide" onclick="adj('${item.id}',+1)">+ 加入</button>`;

  return `
    <div class="card-media">
      ${media}
      <div class="card-badge${qty ? ' on' : ''}">${qty || ''}</div>
    </div>
    <div class="card-body">
      <div class="card-name">${item.name}</div>
      <div class="card-controls">${controls}</div>
    </div>`;
}

function refreshCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const item = findItem(id);
  if (!item) return;
  card.innerHTML = cardHTML(item);
  card.classList.toggle('in-cart', !!(cart[id]?.qty));
}

function findItem(id) {
  for (const cat of MENU) {
    const it = cat.items.find(i => i.id === id);
    if (it) return it;
  }
}

// ═══════════════════════════════════════════
//  CART LOGIC
// ═══════════════════════════════════════════
function adj(id, delta) {
  const item = findItem(id);
  if (!item) return;
  const cur = cart[id]?.qty || 0;
  const nxt = Math.max(0, cur + delta);
  if (nxt === 0) delete cart[id];
  else cart[id] = { item, qty: nxt };
  refreshCard(id);
  updateFab();
  if (document.getElementById('cart-drawer').classList.contains('open')) renderCartBody();
}

function updateFab() {
  const total = Object.values(cart).reduce((s, e) => s + e.qty, 0);
  const fab = document.getElementById('cart-fab');
  const badge = document.getElementById('cart-count-badge');
  fab.classList.toggle('hide', total === 0);
  badge.textContent = total;
}

function renderCartBody() {
  const body = document.getElementById('cart-body');
  const entries = Object.values(cart);
  if (!entries.length) {
    body.innerHTML = `<div class="empty-msg"><div class="eico">🛒</div>还没有选择任何菜品</div>`;
    return;
  }

  let html = '';
  MENU.forEach(cat => {
    const its = entries.filter(e => cat.items.find(i => i.id === e.item.id));
    if (!its.length) return;
    html += `<div class="cat-label">${cat.icon} ${cat.title}</div>`;
    its.forEach(({ item, qty }) => {
      html += `<div class="cart-item">
        <div class="ci-left">
          <div class="ci-emoji">${item.e}</div>
          <div class="ci-name">${item.name}</div>
        </div>
        <div class="ci-controls">
          <button class="qbtn minus" onclick="adj('${item.id}',-1)">−</button>
          <span class="qdisplay">${qty}</span>
          <button class="qbtn plus"  onclick="adj('${item.id}',+1)">+</button>
        </div>
      </div>`;
    });
  });
  body.innerHTML = html;
}

// ═══════════════════════════════════════════
//  DRAWER / MODAL
// ═══════════════════════════════════════════
function openCart() {
  renderCartBody();
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('overlay').classList.add('on');
}

function closeAll() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('checkout-modal').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
}

function clearCart() {
  if (!Object.keys(cart).length) return;
  if (!confirm('确定清空点单吗？')) return;
  cart = {};
  buildMenu();
  updateFab();
  renderCartBody();
}

function openCheckout() {
  closeAll();
  document.getElementById('checkout-modal').classList.add('on');
  document.getElementById('overlay').classList.add('on');
  buildSummary();
}

function closeCheckout() {
  document.getElementById('checkout-modal').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
}

function buildSummary() {
  const d = new Date();
  d.setDate(d.getDate() + dateIdx);
  const DAY = ['日','一','二','三','四','五','六'];
  const ds = `${d.getMonth()+1}月${d.getDate()}日 周${DAY[d.getDay()]}`;

  let html = `<div class="hi-gold">📅 ${ds} · ${meal}</div>`;
  MENU.forEach(cat => {
    const its = Object.values(cart).filter(e => cat.items.find(i => i.id === e.item.id));
    if (!its.length) return;
    html += `<div class="hi-gold" style="margin-top:8px">${cat.title}：</div>`;
    its.forEach(({ item, qty }) => {
      html += `<div class="hi">&nbsp;&nbsp;${item.e} ${item.name} × ${qty}</div>`;
    });
  });
  document.getElementById('order-summary').innerHTML = html;
}

// ═══════════════════════════════════════════
//  SUBMIT ORDER
// ═══════════════════════════════════════════
function submitOrder() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '发送中…';

  const d = new Date();
  d.setDate(d.getDate() + dateIdx);
  const DAY = ['日','一','二','三','四','五','六'];
  const ds = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 周${DAY[d.getDay()]}`;
  const note = document.getElementById('note').value.trim();

  let orderLines = '';
  MENU.forEach(cat => {
    const its = Object.values(cart).filter(e => cat.items.find(i => i.id === e.item.id));
    if (!its.length) return;
    orderLines += `\n【${cat.title}】\n`;
    its.forEach(({ item, qty }) => { orderLines += `  ${item.name} × ${qty}\n`; });
  });

  const message = `就餐时间：${ds} ${meal}\n${orderLines}${note ? '\n备注：' + note : ''}`;

  // Save to local order history
  const orderRecord = {
    id: Date.now(),
    timestamp: new Date().toISOString(),
    date: ds,
    meal,
    note,
    items: Object.values(cart).map(({ item, qty }) => ({
      name: item.name, e: item.e, qty,
      cat: MENU.find(c => c.items.find(i => i.id === item.id))?.title || ''
    }))
  };
  const history = JSON.parse(localStorage.getItem('orderHistory') || '[]');
  history.unshift(orderRecord);
  localStorage.setItem('orderHistory', JSON.stringify(history));

  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    to_email: ORDER_EMAIL,
    subject:  `黄记茶餐厅点餐 · ${meal} · ${ds}`,
    message:  message,
  }).then(() => {
    closeCheckout();
    document.getElementById('overlay').classList.remove('on');
    document.getElementById('success').classList.add('on');
    btn.disabled = false;
    btn.textContent = '发送点单 ✉️';
  }).catch(err => {
    alert('发送失败，请重试：' + JSON.stringify(err));
    btn.disabled = false;
    btn.textContent = '发送点单 ✉️';
  });
}

function resetAll() {
  cart = {};
  document.getElementById('success').classList.remove('on');
  buildMenu();
  updateFab();
}

// ═══════════════════════════════════════════
//  CATEGORY TAB SYNC ON SCROLL
// ═══════════════════════════════════════════
function buildTabObserver() {
  const tabs = document.querySelectorAll('#cat-tabs .tab');

  tabs.forEach(tab => {
    tab.onclick = () => {
      const sec = document.getElementById('cat-' + tab.dataset.cat);
      if (!sec) return;
      // dynamic offset from sticky elements
      const hh = document.getElementById('header').offsetHeight;
      const sh = document.getElementById('settings').offsetHeight;
      const th = document.getElementById('cat-tabs').offsetHeight;
      const offset = hh + sh + th + 8;
      const top = sec.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({ top, behavior: 'smooth' });
    };
  });

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const key = e.target.id.replace('cat-', '');
        tabs.forEach(t => t.classList.toggle('active', t.dataset.cat === key));
        // scroll tab into view
        const activeTab = document.querySelector(`#cat-tabs .tab[data-cat="${key}"]`);
        activeTab?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    });
  }, { rootMargin: '-35% 0px -60% 0px' });

  document.querySelectorAll('.cat-section').forEach(s => obs.observe(s));
}

init();
</script>
</body>
